<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Futures 健診チェックリスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d2240;
    --navy-mid: #1a3a5c;
    --blue: #1d6fa4;
    --blue-light: #2e8fcf;
    --sky: #e8f4fd;
    --sky-deep: #cce7f8;
    --teal: #0f8a7a;
    --teal-light: #e6f5f3;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --rose: #be185d;
    --rose-light: #fdf2f8;
    --slate: #64748b;
    --slate-light: #f1f5f9;
    --white: #ffffff;
    --ink: #0f172a;
    --border: #d1dce8;
    --check-yes: #16a34a;
    --check-no: #e5e7eb;
    --radius: 8px;
    --shadow: 0 2px 12px rgba(13,34,64,.10);
    --shadow-lg: 0 8px 32px rgba(13,34,64,.16);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f5fa;
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── HEADER ───────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, #1a4a7a 100%);
    padding: 32px 24px 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(13,34,64,.35);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-icon {
    width: 48px; height: 48px;
    background: rgba(255,255,255,.12);
    border: 2px solid rgba(255,255,255,.25);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: #fff;
    letter-spacing: .01em;
    line-height: 1.2;
  }

  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,.65);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 20px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,.9);
    font-family: 'IBM Plex Mono', monospace;
  }

  .stat-chip strong {
    color: #7dd3fc;
    font-weight: 600;
  }

  /* ── PROGRESS BAR ─────────────────────────────── */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,.15);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #7dd3fc);
    transition: width .4s ease;
    width: 0%;
  }

  /* ── LAYOUT ───────────────────────────────────── */
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 20px;
    align-items: start;
  }

  /* ── SIDEBAR ──────────────────────────────────── */
  .sidebar {
    position: sticky;
    top: 130px;
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .sidebar-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--slate);
    font-weight: 600;
    background: var(--slate-light);
  }

  .nav-group { border-bottom: 1px solid var(--border); }

  .nav-group-header {
    padding: 8px 16px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--blue);
    font-weight: 600;
    background: rgba(29,111,164,.04);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px 7px 24px;
    cursor: pointer;
    transition: background .15s;
    text-decoration: none;
    color: var(--ink);
    font-size: 12.5px;
    gap: 8px;
  }

  .nav-item:hover { background: var(--sky); }
  .nav-item.active { background: var(--sky-deep); color: var(--blue); font-weight: 500; }

  .nav-progress {
    width: 32px;
    height: 4px;
    background: var(--check-no);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .nav-progress-fill {
    height: 100%;
    background: var(--check-yes);
    border-radius: 2px;
    transition: width .3s;
  }

  /* ── MAIN CONTENT ─────────────────────────────── */
  .main { display: flex; flex-direction: column; gap: 20px; }

  /* ── VISIT CARD ───────────────────────────────── */
  .visit-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow .2s;
  }

  .visit-card:target { scroll-margin-top: 130px; }

  .visit-header {
    padding: 16px 20px;
    background: linear-gradient(to right, var(--navy), var(--navy-mid));
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    user-select: none;
  }

  .visit-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }

  .visit-badge {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 6px;
    padding: 3px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,.9);
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: .04em;
  }

  .visit-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    font-family: 'DM Serif Display', serif;
  }

  .visit-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,.6);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 2px;
  }

  .visit-header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .visit-complete-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #7dd3fc;
  }

  .collapse-btn {
    width: 28px; height: 28px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 14px;
    transition: background .15s, transform .2s;
    flex-shrink: 0;
  }

  .visit-card.collapsed .collapse-btn { transform: rotate(-90deg); }
  .visit-card.collapsed .visit-body { display: none; }

  /* ── VISIT BODY ───────────────────────────────── */
  .visit-body { padding: 0; }

  .visit-section-header {
    padding: 7px 20px;
    background: linear-gradient(to right, rgba(29,111,164,.08), transparent);
    border-bottom: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--blue);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── CHECK ROW ─────────────────────────────────── */
  .check-row {
    display: grid;
    grid-template-columns: 36px 1fr;
    border-bottom: 1px solid rgba(209,220,232,.5);
    transition: background .12s;
    cursor: pointer;
  }

  .check-row:last-child { border-bottom: none; }
  .check-row:hover { background: var(--sky); }
  .check-row.checked { background: linear-gradient(to right, rgba(22,163,74,.04), transparent); }

  .check-cell {
    display: flex;
    align-items: flex-start;
    padding: 10px 0 10px 10px;
  }

  .checkbox {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
    margin-top: 1px;
    background: var(--white);
  }

  .check-row.checked .checkbox {
    background: var(--check-yes);
    border-color: var(--check-yes);
    box-shadow: 0 0 0 3px rgba(22,163,74,.12);
  }

  .checkbox-check {
    display: none;
    color: #fff;
    font-size: 11px;
    line-height: 1;
  }

  .check-row.checked .checkbox-check { display: block; }

  .row-content {
    padding: 9px 20px 9px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .row-label {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.4;
  }

  .check-row.checked .row-label {
    text-decoration: line-through;
    color: var(--slate);
  }

  .row-detail {
    font-size: 12px;
    color: var(--slate);
    line-height: 1.5;
  }

  /* ── TAGS ─────────────────────────────────────── */
  .tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    letter-spacing: .04em;
    margin-right: 4px;
    vertical-align: middle;
  }

  .tag-universal { background: #dbeafe; color: #1d4ed8; }
  .tag-selective { background: #fef3c7; color: #92400e; }
  .tag-all { background: #f0fdf4; color: #166534; }
  .tag-imm { background: #fdf4ff; color: #7e22ce; }

  /* ── MINI ALERT ───────────────────────────────── */
  .alert-row {
    background: linear-gradient(to right, rgba(217,119,6,.06), transparent);
    border-left: 3px solid var(--amber);
    padding: 8px 20px 8px 20px;
    font-size: 11.5px;
    color: #92400e;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    border-bottom: 1px solid rgba(209,220,232,.4);
  }

  /* ── RESET BUTTON ─────────────────────────────── */
  .card-reset {
    display: flex;
    justify-content: flex-end;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--slate-light);
  }

  .btn-reset {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--slate);
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all .15s;
  }

  .btn-reset:hover { background: var(--white); color: var(--rose); border-color: var(--rose); }

  /* ── GLOBAL ACTIONS ───────────────────────────── */
  .global-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all .15s;
    font-weight: 600;
    letter-spacing: .03em;
  }

  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: var(--blue-light); }
  .btn-outline { background: var(--white); color: var(--slate); border-color: var(--border); }
  .btn-outline:hover { background: var(--sky); color: var(--blue); border-color: var(--blue); }
  .btn-danger { background: var(--white); color: var(--rose); border-color: var(--border); }
  .btn-danger:hover { background: var(--rose-light); border-color: var(--rose); }

  /* ── SEARCH ───────────────────────────────────── */
  .search-bar {
    position: relative;
    margin-bottom: 4px;
  }

  .search-input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    background: var(--white);
    color: var(--ink);
    outline: none;
    transition: border .15s, box-shadow .15s;
    box-shadow: var(--shadow);
  }

  .search-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(29,111,164,.12);
  }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--slate);
    font-size: 15px;
    pointer-events: none;
  }

  /* ── FILTERS ──────────────────────────────────── */
  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .filter-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--slate);
    transition: all .15s;
    font-weight: 600;
    letter-spacing: .03em;
  }

  .filter-chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .filter-chip:hover:not(.active) { background: var(--sky); color: var(--blue); border-color: var(--blue); }

  /* ── PRINT ────────────────────────────────────── */
  @media print {
    .header { position: relative; box-shadow: none; }
    .sidebar { display: none; }
    .app { grid-template-columns: 1fr; }
    .global-actions, .search-bar, .filter-row, .card-reset { display: none; }
    .visit-card.collapsed .visit-body { display: block !important; }
    .check-row { page-break-inside: avoid; }
  }

  /* ── RESPONSIVE ───────────────────────────────── */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; top: 0; }
    .header-title { font-size: 18px; }
  }

  /* ── SECTION ICONS ────────────────────────────── */
  .section-icon { font-size: 13px; }

  /* ── EMPTY STATE ──────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--slate);
    font-size: 14px;
  }

  /* Tooltip */
  [title] { cursor: help; }

  /* Highlight when searched */
  .highlight { background: #fef08a; border-radius: 2px; }

  /* Scroll smooth */
  html { scroll-behavior: smooth; }
</style>
</head>
<body>

<header class="header">
  <div class="progress-bar"><div class="progress-fill" id="globalProgress"></div></div>
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-icon">🩺</div>
      <div>
        <div class="header-title">Bright Futures 健診チェックリスト</div>
        <div class="header-sub">AAP 4th Edition · 総合診療医向け · 全健診対応</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-chip">健診 <strong id="totalVisits">21</strong> 回</div>
      <div class="stat-chip">達成 <strong id="doneCount">0</strong>/<span id="totalItems">0</span></div>
      <div class="stat-chip">進捗 <strong id="pctDone">0</strong>%</div>
    </div>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">健診ナビゲーション</div>
    <div id="navContent"></div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="項目を検索 (例：視力、鉛、授乳、ASD...)" oninput="handleSearch(this.value)">
    </div>

    <div class="filter-row" id="filterRow">
      <span class="filter-chip active" onclick="setFilter('all', this)">すべて</span>
      <span class="filter-chip" onclick="setFilter('infancy', this)">🍼 乳児期</span>
      <span class="filter-chip" onclick="setFilter('early', this)">🧒 幼児期</span>
      <span class="filter-chip" onclick="setFilter('middle', this)">📚 学童期</span>
      <span class="filter-chip" onclick="setFilter('adolescent', this)">🌱 思春期</span>
    </div>

    <div class="global-actions">
      <button class="btn btn-primary" onclick="expandAll()">▼ 全て展開</button>
      <button class="btn btn-outline" onclick="collapseAll()">▲ 全て折りたたむ</button>
      <button class="btn btn-outline" onclick="window.print()">🖨 印刷</button>
      <button class="btn btn-danger" onclick="resetAll()">↺ リセット</button>
    </div>

    <div id="visitContainer"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA

const VISIT_DATA = [

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let checkedState = {};
let currentFilter = 'all';
let currentSearch = '';

function getKey(visitId, sectionIdx, itemIdx) {
  return `${visitId}__${sectionIdx}__${itemIdx}`;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderAll() {
  renderNav();
  renderVisits();
  updateStats();
}

function renderNav() {
  const groups = [
    { id: 'infancy', label: '🍼 乳児期', ids: ['prenatal','newborn','firstweek','1month','2month','4month','6month','9month','12month'] },
    { id: 'early', label: '🧒 幼児期', ids: ['15month','18month','2year','2half','3year','4year'] },
    { id: 'middle', label: '📚 学童期', ids: ['5_6year','7_8year','9_10year'] },
    { id: 'adolescent', label: '🌱 思春期', ids: ['early_adol','mid_adol','late_adol'] },
  ];

  let html = '';
  for (const g of groups) {
    html += `<div class="nav-group"><div class="nav-group-header">${g.label}</div>`;
    for (const id of g.ids) {
      const visit = VISIT_DATA.find(v => v.id === id);
      if (!visit) continue;
      const { done, total } = getVisitProgress(visit);
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      html += `<a class="nav-item" href="#card-${id}">
        <span>${visit.badge}</span>
        <div class="nav-progress"><div class="nav-progress-fill" style="width:${pct}%"></div></div>
      </a>`;
    }
    html += `</div>`;
  }
  document.getElementById('navContent').innerHTML = html;
}

function getVisitProgress(visit) {
  let total = 0, done = 0;
  visit.sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      total++;
      if (checkedState[getKey(visit.id, si, ii)]) done++;
    });
  });
  return { done, total };
}

function renderVisits() {
  const container = document.getElementById('visitContainer');
  const query = currentSearch.trim().toLowerCase();

  let visibleCount = 0;
  let html = '';

  for (const visit of VISIT_DATA) {
    if (currentFilter !== 'all' && visit.group !== currentFilter) continue;

    // Search filter
    if (query) {
      const haystack = (visit.title + visit.subtitle + visit.sections.map(s =>
        s.name + s.items.map(i => i.label + i.detail).join(' ')
      ).join(' ')).toLowerCase();
      if (!haystack.includes(query)) continue;
    }

    visibleCount++;
    html += buildVisitCard(visit, query);
  }

  if (visibleCount === 0) {
    html = `<div class="empty-state">🔍 該当する健診・項目が見つかりませんでした。</div>`;
  }

  container.innerHTML = html;
  addEventListeners();
}

function buildVisitCard(visit, query = '') {
  const { done, total } = getVisitProgress(visit);

  let sectionsHtml = '';
  for (let si = 0; si < visit.sections.length; si++) {
    const sec = visit.sections[si];
    const icons = { 'スクリーニング': '🔬', '発達サーベイランス': '🧠', '身体計測・診察': '📏', 'Anticipatory Guidance': '💬', '予防接種': '💉' };
    const icon = sec.icon || '📋';

    sectionsHtml += `<div class="visit-section-header"><span class="section-icon">${icon}</span>${esc(sec.name)}</div>`;

    for (let ii = 0; ii < sec.items.length; ii++) {
      const item = sec.items[ii];
      const key = getKey(visit.id, si, ii);
      const checked = checkedState[key] ? 'checked' : '';

      let labelHtml = query ? highlight(esc(item.label), query) : esc(item.label);
      let detailHtml = item.detail ? (query ? highlight(esc(item.detail), query) : esc(item.detail)) : '';

      let tagHtml = '';
      if (item.tag === 'universal') tagHtml = '<span class="tag tag-universal">全例</span>';
      else if (item.tag === 'selective') tagHtml = '<span class="tag tag-selective">選択的</span>';
      else if (item.tag === 'imm') tagHtml = '<span class="tag tag-imm">接種</span>';

      sectionsHtml += `
        <div class="check-row ${checked}" data-key="${key}" onclick="toggleCheck('${key}')">
          <div class="check-cell">
            <div class="checkbox"><span class="checkbox-check">✓</span></div>
          </div>
          <div class="row-content">
            <div class="row-label">${tagHtml}${labelHtml}</div>
            ${detailHtml ? `<div class="row-detail">${detailHtml}</div>` : ''}
          </div>
        </div>`;
    }
  }

  const noteHtml = visit.note ? `<div class="alert-row">⚠️ ${esc(visit.note)}</div>` : '';

  return `
  <div class="visit-card" id="card-${visit.id}">
    <div class="visit-header" onclick="toggleCard('card-${visit.id}')">
      <div class="visit-header-left">
        <span class="visit-badge">${esc(visit.badge)}</span>
        <div>
          <div class="visit-title">${esc(visit.title)}</div>
          <div class="visit-subtitle">${esc(visit.subtitle)}</div>
        </div>
      </div>
      <div class="visit-header-right">
        <span class="visit-complete-count">${done}/${total}</span>
        <div class="collapse-btn">▼</div>
      </div>
    </div>
    <div class="visit-body">
      ${noteHtml}
      ${sectionsHtml}
      <div class="card-reset">
        <button class="btn-reset" onclick="event.stopPropagation();resetVisit('${visit.id}')">↺ この健診をリセット</button>
      </div>
    </div>
  </div>`;
}

function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<mark class="highlight">$1</mark>');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addEventListeners() {
  // Already handled via inline onclick
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function toggleCheck(key) {
  checkedState[key] = !checkedState[key];
  saveState();
  // Update only that row
  const row = document.querySelector(`[data-key="${key}"]`);
  if (row) {
    if (checkedState[key]) row.classList.add('checked');
    else row.classList.remove('checked');
    // Update checkbox
    const cb = row.querySelector('.checkbox');
    const check = row.querySelector('.checkbox-check');
    if (checkedState[key]) {
      cb.style.background = 'var(--check-yes)';
      cb.style.borderColor = 'var(--check-yes)';
      check.style.display = 'block';
    } else {
      cb.style.background = '';
      cb.style.borderColor = '';
      check.style.display = 'none';
    }
  }
  updateStats();
  updateNavProgress();
}

function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  if (card) card.classList.toggle('collapsed');
}

function expandAll() {
  document.querySelectorAll('.visit-card').forEach(c => c.classList.remove('collapsed'));
}

function collapseAll() {
  document.querySelectorAll('.visit-card').forEach(c => c.classList.add('collapsed'));
}

function resetVisit(visitId) {
  const visit = VISIT_DATA.find(v => v.id === visitId);
  if (!visit) return;
  if (!confirm(`「${visit.title}」のチェックをすべてリセットしますか？`)) return;
  visit.sections.forEach((sec, si) => {
    sec.items.forEach((_, ii) => {
      delete checkedState[getKey(visitId, si, ii)];
    });
  });
  saveState();
  renderVisits();
  updateStats();
}

function resetAll() {
  if (!confirm('すべての健診のチェックをリセットしますか？')) return;
  checkedState = {};
  saveState();
  renderVisits();
  updateStats();
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderVisits();
}

function handleSearch(val) {
  currentSearch = val;
  renderVisits();
}

// ═══════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════
function updateStats() {
  let total = 0, done = 0;
  for (const visit of VISIT_DATA) {
    const p = getVisitProgress(visit);
    total += p.total;
    done += p.done;
  }
  document.getElementById('totalItems').textContent = total;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('pctDone').textContent = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('globalProgress').style.width = total > 0 ? (done / total * 100) + '%' : '0%';

  // Update visit complete counts
  for (const visit of VISIT_DATA) {
    const card = document.getElementById('card-' + visit.id);
    if (!card) continue;
    const { done: vd, total: vt } = getVisitProgress(visit);
    const countEl = card.querySelector('.visit-complete-count');
    if (countEl) countEl.textContent = `${vd}/${vt}`;
  }
}

function updateNavProgress() {
  // Re-render nav progress bars
  const navContent = document.getElementById('navContent');
  if (!navContent) return;
  for (const visit of VISIT_DATA) {
    const { done, total } = getVisitProgress(visit);
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const fill = navContent.querySelector(`a[href="#card-${visit.id}"] .nav-progress-fill`);
    if (fill) fill.style.width = pct + '%';
  }
}

// ═══════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════
function saveState() {
  try { localStorage.setItem('bf_checklist', JSON.stringify(checkedState)); } catch(e) {}
}

function loadState() {
  try {
    const s = localStorage.getItem('bf_checklist');
    if (s) checkedState = JSON.parse(s);
  } catch(e) { checkedState = {}; }
}
